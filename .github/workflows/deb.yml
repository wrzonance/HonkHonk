name: DEB Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    name: Build .deb (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get -o Acquire::Retries=3 update
          sudo apt-get -o Acquire::Retries=3 install -y --no-install-recommends \
            libgtk-3-dev libglib2.0-dev libxdo-dev libpipewire-0.3-dev \
            pkg-config lintian imagemagick

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny + cargo-deb
        run: |
          cargo install cargo-deny --version 0.19.4 --locked
          cargo install cargo-deb --version 3.7.0 --locked

      - name: Audit dependencies
        run: cargo deny check

      - name: Validate packaging prerequisites
        run: bash tests/packaging/deb_validate.sh

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build .deb
        run: cargo deb --target x86_64-unknown-linux-gnu --no-build

      - name: Lint .deb with lintian
        run: |
          DEB=$(ls target/x86_64-unknown-linux-gnu/debian/honkhonk_*.deb | head -1)
          echo "Package: $DEB"
          lintian --suppress-tags no-upstream-changelog,no-manual-page "$DEB" || true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: honkhonk-deb-${{ github.ref_name }}
          path: target/x86_64-unknown-linux-gnu/debian/honkhonk_*.deb

      - name: Attach .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          DEB=$(ls target/x86_64-unknown-linux-gnu/debian/honkhonk_*.deb | head -1)
          gh release upload "$TAG_NAME" "$DEB"
