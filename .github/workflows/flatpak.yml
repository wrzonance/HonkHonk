name: Flatpak

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-flatpak:
    name: Build Flatpak (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged

    steps:
      - uses: actions/checkout@v6

      - name: Validate Flatpak manifest
        run: bash tests/packaging/flatpak_validate.sh

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Audit dependencies
        run: cargo deny check

      - name: Generate cargo-sources.json
        run: |
          # flatpak-cargo-generator.py is vendored at packaging/flatpak/ —
          # no network fetch of untrusted scripts at build time.
          pip3 install aiohttp tomlkit
          python3 packaging/flatpak/flatpak-cargo-generator.py Cargo.lock \
            -o packaging/flatpak/cargo-sources.json

      - name: Install Rust SDK extension
        run: |
          flatpak remote-add --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --noninteractive flathub \
            org.freedesktop.Sdk.Extension.rust-stable//24.08

      - name: Build with flatpak-builder
        run: |
          flatpak-builder \
            --repo=repo \
            --install-deps-from=flathub \
            --force-clean \
            builddir \
            packaging/flatpak/io.github.thewrz.HonkHonk.yml

      - name: Bundle
        run: |
          flatpak build-bundle repo honkhonk.flatpak io.github.thewrz.HonkHonk

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: honkhonk-flatpak-${{ github.ref_name }}
          path: honkhonk.flatpak

      - name: Attach Flatpak to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 \
            || gh release create "$TAG_NAME" --generate-notes
          gh release upload "$TAG_NAME" honkhonk.flatpak --clobber
