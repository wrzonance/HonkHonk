app-id: io.github.thewrz.HonkHonk
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm18
command: honkhonk

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/llvm18/bin
  prepend-pkg-config-path: /app/lib/pkgconfig
  env:
    CARGO_HOME: /run/build/honkhonk/cargo
    LIBCLANG_PATH: /usr/lib/sdk/llvm18/lib
    LIBRARY_PATH: /app/lib

finish-args:
  # Wayland display
  - --socket=wayland
  # PipeWire via PulseAudio compat socket
  - --socket=pulseaudio
  # GPU access for wgpu renderer; fallback to tiny-skia still needs DRI for display
  - --device=dri
  # Shared memory required by some Wayland compositors
  - --share=ipc
  # System tray via StatusNotifierItem protocol
  - --talk-name=org.kde.StatusNotifierWatcher
  # Sound library: read-only access to user's music folder
  - --filesystem=xdg-music:ro
  # User config and data dirs (XDG paths used by honkhonk)
  - --filesystem=xdg-config/honkhonk:create
  - --filesystem=xdg-data/honkhonk:create

modules:
  # muda (tray-icon menu library) links libxdo unconditionally on Linux.
  # Not in the freedesktop SDK — build from source.
  - name: xdotool
    buildsystem: simple
    build-options:
      env:
        PREFIX: /app
    build-commands:
      - make
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/jordansissel/xdotool/archive/refs/tags/v3.20211022.1.tar.gz
        sha256: 82b15a944a5e82fee15e0f6116bd9f642bc3d0bb6989fc0ca5ad9dfe35de0847

  - name: honkhonk
    buildsystem: simple
    build-commands:
      # Build release binary using the vendored cargo sources
      - cargo --offline build --release --target x86_64-unknown-linux-gnu
      # Install binary — /app/bin is on PATH inside the sandbox
      - install -Dm755 target/x86_64-unknown-linux-gnu/release/honkhonk
          /app/bin/honkhonk
      # Install .desktop entry — /app/share is in XDG_DATA_DIRS
      - install -Dm644 assets/honkhonk.desktop
          /app/share/applications/io.github.thewrz.HonkHonk.desktop
      # Install icon
      - install -Dm644 assets/icons/hicolor/256x256/apps/honkhonk.png
          /app/share/icons/hicolor/256x256/apps/honkhonk.png
      # Install AppStream metainfo
      - install -Dm644 packaging/flatpak/io.github.thewrz.HonkHonk.metainfo.xml
          /app/share/metainfo/io.github.thewrz.HonkHonk.metainfo.xml
      # NOTE (issue #49): the persistent PipeWire conf.d drop-in is NOT installed
      # in the Flatpak. The sandbox cannot write host PipeWire config, and the
      # app talks to PipeWire via the pulseaudio socket. The app's first-run
      # fallback creates a lingering source + per-user conf.d instead. See
      # docs/adr/004-persistent-source-conf-d.md.
    sources:
      - type: dir
        path: ../..
      # cargo-sources.json is generated by flatpak-cargo-generator.py from Cargo.lock.
      # Regenerate when dependencies change:
      #   python3 flatpak-cargo-generator.py Cargo.lock -o packaging/flatpak/cargo-sources.json
      - cargo-sources.json
