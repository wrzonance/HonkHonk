# cargo-deny configuration — runs in every CI job
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
]

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste is unmaintained; transitive dep via lofty. No fix available without
    # lofty dropping its paste dependency upstream.
    { id = "RUSTSEC-2024-0436", reason = "transitive via lofty, no patched version available upstream" },
    # ttf-parser is unmaintained; transitive via iced's font stack. No safe
    # upgrade is available until iced/cosmic-text/winit move off it upstream.
    { id = "RUSTSEC-0000-0000", reason = "transitive via iced font dependencies, no patched version available upstream" },
]

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "0BSD",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
]
# OR-expression crates — cargo-deny picks the first allowed license:
#   self_cell:  Apache-2.0 OR GPL-2.0-only      → Apache-2.0
#   r-efi:      MIT OR Apache-2.0 OR LGPL-2.1   → MIT

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
